name: docker-multiarch

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to build and the Docker tag to apply
        required: true
        type: string
  pull_request:
    branches: [ 'master' ]

permissions:
  contents: read

concurrency:
  group: docker-multiarch-${{ github.event.pull_request.number || github.event.inputs.tag || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    env:
      WORK: ${{ github.workspace }}/tmp
      MAVEN_REPO_LOCAL: ${{ github.workspace }}/tmp/.m2/repository
      IMAGE_PLATFORMS: linux/amd64,linux/arm64
      LOCAL_REGISTRY: localhost:5000
      DOCKER_NAMESPACE: localhost:5000/walmartlabs

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Resolve build target
        run: |
          if [[ "${{ github.event_name }}" == 'workflow_dispatch' ]]; then
            build_tag='${{ github.event.inputs.tag }}'

            if ! [[ "${build_tag}" =~ ^[A-Za-z0-9_][A-Za-z0-9._-]{0,127}$ ]]; then
              echo "Tag '${build_tag}' is not a valid Docker tag." >&2
              exit 1
            fi

            if ! git fetch --no-tags --depth=1 origin "refs/tags/${build_tag}:refs/tags/${build_tag}"; then
              echo "Git tag '${build_tag}' was not found in origin." >&2
              exit 1
            fi

            git checkout --detach "refs/tags/${build_tag}"
          else
            build_tag="pr-${{ github.event.pull_request.number }}-$(git rev-parse --short=12 HEAD)"
          fi

          echo "BUILD_TAG=${build_tag}" >> "$GITHUB_ENV"
          echo "Using BUILD_TAG=${build_tag}"
          git rev-parse HEAD

      - name: Restore Maven cache
        id: restore-maven-cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ${{ env.MAVEN_REPO_LOCAL }}
          key: ${{ runner.os }}-maven-docker-multiarch-${{ hashFiles('**/pom.xml', '.github/settings.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-docker-multiarch-
            ${{ runner.os }}-maven-

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          driver: docker-container
          driver-opts: |
            network=host

      - name: Start local registry
        run: |
          docker run -d -p 5000:5000 --name registry registry:2

          for i in $(seq 1 30); do
            if curl -fsS "http://${LOCAL_REGISTRY}/v2/" >/dev/null; then
              exit 0
            fi

            sleep 1
          done

          docker logs registry
          exit 1

      - name: Build Docker images
        run: |
          mkdir -p "${WORK}" "${MAVEN_REPO_LOCAL}"
          chmod 1777 "${WORK}"

          ./mvnw -s .github/settings.xml -B clean package \
            -Dmaven.repo.local="${MAVEN_REPO_LOCAL}" \
            -Djava.io.tmpdir="${WORK}" \
            -DskipTests \
            -Pgha -Pdocker \
            -pl docker-images -am \
            -Ddocker.namespace="${DOCKER_NAMESPACE}" \
            -Ddocker.imageTag="${BUILD_TAG}" \
            -Ddocker.extraTags= \
            -Ddocker.output=--push \
            -Dimage.platforms="${IMAGE_PLATFORMS}"

      - name: Verify multi-arch manifests
        run: |
          images=(
            concord-base
            concord-ansible
            concord-agent
            concord-server
            concord-agent-operator
          )

          for image in "${images[@]}"; do
            ref="${DOCKER_NAMESPACE}/${image}:${BUILD_TAG}"
            echo "Inspecting ${ref}"
            output=$(docker buildx imagetools inspect "${ref}")
            printf '%s\n' "${output}"

            printf '%s\n' "${output}" | grep -q 'linux/amd64'
            printf '%s\n' "${output}" | grep -q 'linux/arm64'
          done

      - name: Remove local Concord artifacts from Maven cache
        if: success()
        run: rm -rf "${MAVEN_REPO_LOCAL}/com/walmartlabs/concord"

      - name: Save Maven cache
        if: success() && steps.restore-maven-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ${{ env.MAVEN_REPO_LOCAL }}
          key: ${{ steps.restore-maven-cache.outputs.cache-primary-key }}
