configuration:
  runtime: "concord-v2"
  validation:
    taskCalls:
      in: fail

flows:
  default:
    - task: concord
      in:
        action: STARTEXTERNAL
        project: "test"
        apiKey: "dummy"
        activeProfiles: "profileA"
        tags: "schema-test"
        sync: false
      out: result
      error:
        - log: "Expected error: ${lastError}"
    - log: "Done"
