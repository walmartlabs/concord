<!DOCTYPE html>
<html lang="en" th:fragment="layout(content)" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Concord</title>
    <link id="favicon" rel="shortcut icon" href="../favicon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        #sidebar {
            min-height: 100vh;
            box-shadow: 2px 0 5px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease-in-out;
        }

        .sidebar-sticky {
            position: sticky;
            top: 0;
            height: 100vh;
            padding-top: 0.5rem;
            overflow-x: hidden;
            overflow-y: auto;
        }

        .content {
            min-height: 100vh;
            background-color: #f8f9fa;
        }

        #menu-toggle {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 1050;
        }

        .profile-button {
            background: none;
            border: none;
            text-align: left;
            width: 100%;
            padding: 0;
        }

        .profile-button:hover {
            background-color: #f8f9fa;
        }

        .profile-dropdown {
            position: fixed !important;
            margin-top: 0.5rem !important;
        }

        @media (max-width: 767px) {
            #sidebar {
                position: fixed;
                top: 0;
                left: 0;
                z-index: 1040;
                transform: translateX(-100%);
            }

            /* used in JS */
            /*noinspection CssUnusedSymbol*/
            #sidebar.show {
                transform: translateX(0);
            }

            .content {
                margin-top: 4rem;
            }
        }

        @media (min-width: 768px) {
            #menu-toggle {
                display: none;
            }
        }
    </style>
    <style th:replace="~{_components :: styles}"></style>
</head>
<body>

<!-- Hamburger Menu Button -->
<button id="menu-toggle" class="btn btn-primary" type="button">
    <i class="bi bi-list"></i>
</button>

<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <nav id="sidebar" class="col-md-3 col-lg-2 d-md-block bg-white">
            <div class="sidebar-sticky d-flex flex-column">
                <!-- App Title -->
                <div class="p-3">
                    <h5 class="text-primary">Concord</h5>
                </div>

                <!-- Navigation Menu -->
                <div class="nav flex-column">
                    <div th:replace="~{_components :: nav-link('/processes', 'bi bi-gear', 'Processes')}"></div>
                    <div th:replace="~{_components :: nav-link('/projects', 'bi bi-folder', 'Projects')}"></div>
                    <div th:replace="~{_components :: nav-link('/json-stores', 'bi bi-database', 'JSON Stores')}"></div>
                    <div th:replace="~{_components :: nav-link('/secrets', 'bi bi-key', 'Secrets')}"></div>
                    <div th:replace="~{_components :: nav-link('/teams', 'bi bi-people', 'Teams')}"></div>
                </div>

                <!-- Spacer -->
                <div class="flex-grow-1"></div>

                <!-- Profile/Login Section -->
                <div class="p-3 border-top">
                    <!-- Show profile dropdown if user exists -->
                    <div th:if="${user != null}" class="dropdown">
                        <button class="profile-button rounded p-2 d-flex align-items-center gap-2"
                                type="button"
                                data-bs-toggle="dropdown"
                                aria-expanded="false">

                            <i class="bi bi-person-circle fs-4"></i>

                            <span class="text-truncate"
                                  th:text="${user.displayName != null ? user.displayName : user.name}">User Name</span>

                            <i class="bi bi-chevron-down ms-auto"></i>
                        </button>
                        <ul class="dropdown-menu profile-dropdown">
                            <li>
                                <a class="dropdown-item" href="/profile">
                                    <i class="bi bi-person me-2"></i>Profile
                                </a>
                            </li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li>
                                <form th:action="${basePath} + '/logout'" method="post" class="dropdown-item">
                                    <button type="submit" class="btn btn-link text-danger p-0">
                                        <i class="bi bi-box-arrow-right me-2"></i>Logout
                                    </button>
                                </form>
                            </li>
                        </ul>
                    </div>

                    <!-- Show login button if no user -->
                    <a th:if="${user == null}" th:href="'/#/login?redirectTo=' + ${request.requestURI}"
                       class="btn btn-primary w-100">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Log in
                    </a>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main id="content" class="col-md-9 col-lg-10 content">
            <div class="d-flex align-items-center justify-content-center h-100" th:replace="${content}">
                <div class="text-center">
                    <h1>Welcome!</h1>
                    <p class="lead">We're glad to see you here.</p>
                </div>
            </div>
        </main>
    </div>
</div>

<div class="position-fixed bottom-0 end-0 p-3" style="z-index: 9999;">
    <div id="toast-container"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/htmx.org"></script>

<!-- A global handler for HTMX errors -->
<script>
    document.body.addEventListener('htmx:error', (event) => {
        const toastHTML = `
            <div class="toast text-bg-danger border-0 mb-1" data-bs-autohide="false" role="alert">
                <div class="d-flex">
                    <div class="toast-body">
                        Oops! Something went wrong. Please try again.
                        <textarea class="form-control mt-2 w-100" style="font-family: monospace; resize: none;" rows="4" readonly>${JSON.stringify(event.detail.errorInfo.error, null, 2)}</textarea>
                    </div>
                    <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
                </div>
            </div>
        `;

        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = toastHTML;

        const newToast = tempDiv.firstElementChild;

        const toastContainer = document.getElementById('toast-container');
        toastContainer.appendChild(newToast);

        const toastInstance = new bootstrap.Toast(newToast);
        toastInstance.show();
    });
</script>
<script>
    <!-- A toggle for the sidebar -->
    document.getElementById('menu-toggle').addEventListener('click', function () {
        document.getElementById('sidebar').classList.toggle('show');
    });
</script>

</body>
</html>
