<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Concord</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        #sidebar {
            min-height: 100vh;
            box-shadow: 2px 0 5px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease-in-out;
        }

        .sidebar-sticky {
            position: sticky;
            top: 0;
            height: 100vh;
            padding-top: 0.5rem;
            overflow-x: hidden;
            overflow-y: auto;
        }

        .content {
            min-height: 100vh;
            background-color: #f8f9fa;
        }

        #menu-toggle {
            position: fixed;
            top: 1rem;
            left: 1rem;
            z-index: 1050;
        }

        .profile-button {
            background: none;
            border: none;
            text-align: left;
            width: 100%;
            padding: 0;
        }

        .profile-button:hover {
            background-color: #f8f9fa;
        }

        .profile-dropdown {
            position: fixed !important;
            margin-top: 0.5rem !important;
        }

        .nav-link {
            color: #6c757d;
            padding: 0.5rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .nav-link:hover {
            color: #0d6efd;
            background-color: #f8f9fa;
        }

        .nav-link:active {
            color: #0d6efd;
            background-color: #e9ecef;
            font-weight: 500;
        }

        @media (max-width: 767.98px) {
            #sidebar {
                position: fixed;
                top: 0;
                left: 0;
                z-index: 1040;
                transform: translateX(-100%);
            }

            #sidebar.show {
                transform: translateX(0);
            }

            .content {
                margin-top: 4rem;
            }
        }

        @media (min-width: 768px) {
            #menu-toggle {
                display: none;
            }
        }
    </style>
</head>
<body>
<!-- Hamburger Menu Button -->
<button id="menu-toggle" class="btn btn-primary" type="button">
    <i class="bi bi-list"></i>
</button>

<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <nav id="sidebar" class="col-md-3 col-lg-2 d-md-block bg-white">
            <div class="sidebar-sticky d-flex flex-column">
                <!-- App Title -->
                <div class="p-3">
                    <h5 class="text-primary">Concord</h5>
                </div>

                <!-- Navigation Menu -->
                <div class="nav flex-column">
                    <a href="/processes" class="nav-link">
                        <i class="bi bi-gear"></i>
                        Processes
                    </a>
                    <a href="/projects" class="nav-link">
                        <i class="bi bi-folder"></i>
                        Projects
                    </a>
                    <a href="/json-stores" class="nav-link">
                        <i class="bi bi-database"></i>
                        JSON Stores
                    </a>
                    <a href="/secrets" class="nav-link">
                        <i class="bi bi-key"></i>
                        Secrets
                    </a>
                    <a href="/teams" class="nav-link">
                        <i class="bi bi-people"></i>
                        Teams
                    </a>
                </div>

                <!-- Spacer -->
                <div class="flex-grow-1"></div>

                <!-- Profile/Login Section -->
                <div class="p-3 border-top">
                    <!-- Show profile dropdown if user exists -->
                    <div th:if="${user != null}" class="dropdown">
                        <button class="profile-button rounded p-2 d-flex align-items-center gap-2"
                                type="button"
                                data-bs-toggle="dropdown"
                                aria-expanded="false">
                            <i class="bi bi-person-circle fs-4"></i>
                            <span class="text-truncate"
                                  th:text="${user.displayName != null ? user.displayName : user.name}">User Name</span>
                            <i class="bi bi-chevron-down ms-auto"></i>
                        </button>
                        <ul class="dropdown-menu profile-dropdown">
                            <li>
                                <a class="dropdown-item" href="/profile">
                                    <i class="bi bi-person me-2"></i>Profile
                                </a>
                            </li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li>
                                <form action="/logout" method="post" class="dropdown-item">
                                    <button type="submit" class="btn btn-link text-danger p-0">
                                        <i class="bi bi-box-arrow-right me-2"></i>Logout
                                    </button>
                                </form>
                            </li>
                        </ul>
                    </div>

                    <!-- Show login button if no user -->
                    <button th:if="${user == null}" class="btn btn-primary w-100">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Log in
                    </button>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="col-md-9 col-lg-10 content">
            <div class="d-flex align-items-center justify-content-center h-100">
                <div class="text-center">
                    <h1>Welcome!</h1>
                    <p class="lead">We're glad to see you here.</p>
                </div>
            </div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('menu-toggle').addEventListener('click', function () {
        document.getElementById('sidebar').classList.toggle('show');
    });

    // Close sidebar when clicking outside on mobile
    document.addEventListener('click', function (event) {
        const sidebar = document.getElementById('sidebar');
        const menuToggle = document.getElementById('menu-toggle');

        if (window.innerWidth < 768 &&
            !sidebar.contains(event.target) &&
            !menuToggle.contains(event.target) &&
            sidebar.classList.contains('show')) {
            sidebar.classList.remove('show');
        }
    });
</script>
</body>
</html>
