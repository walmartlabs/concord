<div th:fragment="profileMenu">
    <div th:if="${user != null}" class="dropdown">
        <button class="profile-button rounded p-2 d-flex align-items-center gap-2"
                type="button"
                data-bs-toggle="dropdown"
                aria-expanded="false">
            <i class="bi bi-person-circle fs-4"></i>
            <span class="text-truncate" th:text="${user.displayName != null ? user.displayName : user.name}">User Name</span>
            <i class="bi bi-chevron-down ms-auto"></i>
        </button>
        <ul class="dropdown-menu profile-dropdown">
            <li>
                <a class="dropdown-item" href="/profile">
                    <i class="bi bi-person me-2"></i>Profile
                </a>
            </li>
            <li><hr class="dropdown-divider"></li>
            <li>
                <form action="/logout" method="post" class="dropdown-item">
                    <button type="submit" class="btn btn-link text-danger p-0">
                        <i class="bi bi-box-arrow-right me-2"></i>Logout
                    </button>
                </form>
            </li>
        </ul>
    </div>

    <button th:if="${user == null}" class="btn btn-primary w-100">
        <i class="bi bi-box-arrow-in-right me-2"></i>Log in
    </button>
</div>
