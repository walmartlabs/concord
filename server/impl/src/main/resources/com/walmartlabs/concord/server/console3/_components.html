<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Concord</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style th:fragment="styles">
        .nav-link {
            color: #6c757d;
            padding: 0.5rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .nav-link:hover {
            color: #0d6efd;
            background-color: #f8f9fa;
        }

        .nav-link:active {
            color: #0d6efd;
            background-color: #e9ecef;
            font-weight: 500;
        }
    </style>
</head>
<body>
<th:block th:fragment="nav-link(path, iconClass, text)">
    <a href="#"
       th:href="${basePath} + ${path}"
       th:hx-get="${basePath} + ${path}"
       hx-target="#content"
       hx-swap="innerHTML"
       hx-push-url="true"
       class="nav-link">
        <i class="bi bi-gear" th:class="${iconClass}"></i>
        <span th:text="${text}">Settings</span>
    </a>
</th:block>
</body>
</html>
